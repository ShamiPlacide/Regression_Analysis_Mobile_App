# Render Blueprint for the FastAPI prediction service.
#
# PLACEMENT: this file lives at your repository ROOT (the folder that contains
# `summative/`, `requirements.txt`, and this file).
#
# Layout assumed (matches your repo):
#   <repo root>/
#     requirements.txt          <- build installs this (at the ROOT)
#     render.yaml               <- this file
#     summative/
#       API/prediction.py       <- the FastAPI app  (started via --app-dir)
#       linear_regression/best_model.pkl
#
# Because requirements.txt is at the root and the app is in summative/API, we do
# NOT set rootDir. We build from the root (where requirements.txt is) and start
# uvicorn with --app-dir so it can import prediction.py from summative/API.
services:
  - type: web
    name: electricity-predictor-api
    env: python
    plan: free                      # free tier is fine for this assignment
    region: oregon                  # change if you prefer another region
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn prediction:app --app-dir summative/API --host 0.0.0.0 --port $PORT"
    healthCheckPath: /              # our GET / returns 200 -> Render marks the service healthy
    envVars:
      # Pin Python to a version with wheels for scikit-learn 1.6.1 (matches the
      # environment that trained/saved best_model.pkl). Keeps the sklearn ABI consistent.
      - key: PYTHON_VERSION
        value: "3.11.9"
